name: ChatGPT export artifact

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/chatgpt-export-artifact.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Download verified release files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download chatgpt-linux-env \
            --pattern "rap-atlas-linux-env.tar.gz*"
          sha256sum -c rap-atlas-linux-env.tar.gz.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: rap-atlas-linux-env
          path: |
            rap-atlas-linux-env.tar.gz
            rap-atlas-linux-env.tar.gz.sha256
          if-no-files-found: error
          retention-days: 3
          compression-level: 0
      - name: Record workflow run ID
        run: |
          mkdir -p .github/build-status
          cat > .github/build-status/chatgpt-export-artifact.json <<EOF
          {
            "status": "success",
            "run_id": ${GITHUB_RUN_ID},
            "source_commit": "${GITHUB_SHA}",
            "artifact_name": "rap-atlas-linux-env"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/build-status/chatgpt-export-artifact.json
          git commit -m "ci: record artifact export run"
          git pull --rebase origin main
          git push origin HEAD:main
